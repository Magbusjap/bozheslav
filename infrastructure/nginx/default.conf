# Вверху файла, ДО server {
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/m;

server {
    server_name bozheslav.com www.bozheslav.com;
    server_tokens off;
    client_max_body_size 100M;
    root /var/www/bozheslav/cms/public;
    index index.php;

    location ^~ /portfolio/pages/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /portfolio/ {
        if ($uri = /portfolio/) {
            rewrite ^ /index.php last;
        }
        try_files $uri $uri/index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /adminer.php {
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    include fastcgi_params;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|svg)$ {
    try_files $uri $uri/ /index.php?$query_string;
    expires 30d;
    add_header Cache-Control "public, no-transform";
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.ht {
        deny all;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/bozheslav.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bozheslav.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /magbusjap {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

}

server {
    if ($host = www.bozheslav.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = bozheslav.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name bozheslav.com www.bozheslav.com;
    server_tokens off;
    return 404;

}
